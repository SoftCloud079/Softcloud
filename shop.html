<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftCloud Merch Shop</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#0a0a0a;
      margin:0;
      color:#eee;
      display:flex;
      flex-direction:column;
      min-height:100vh;
    }

    /* Banner */
    #banner{
      width:100%;
      background:#4b0082;
      color:white;
      text-align:center;
      padding:12px;
      font-weight:500;
      box-shadow:0 2px 8px rgba(0,0,0,.6);
      transition:.5s;
    }

    /* Sidebar */
    .sidebar {
      height: 100%;
      width: 0;
      position: fixed;
      top: 0;
      left: 0;
      background-color: #1a001a;
      overflow-x: hidden;
      transition: 0.3s;
      padding-top: 60px;
      z-index: 1000;
    }

    .sidebar a {
      padding: 12px 24px;
      text-decoration: none;
      font-size: 1.1rem;
      color: #eee;
      display: block;
      transition: 0.2s;
    }

    .sidebar a:hover {
      background-color: #9b59b6;
      color: white;
    }

    .sidebar .closebtn {
      position: absolute;
      top: 10px;
      right: 18px;
      font-size: 2em;
    }

    .openbtn {
      font-size: 1.2em;
      cursor: pointer;
      color: #eee;
      background-color: #1a001a;
      padding: 10px 15px;
      border-radius: 6px;
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 1001;
      transition: background-color 0.2s;
    }

    .openbtn:hover {
      background-color: #9b59b6;
    }

    /* Container */
    .container{
      padding:30px 20px;
      flex:1;
      margin-top:40px; /* so sidebar button doesn't overlap hero */
    }

    h1{
      text-align:center;
      color:#9b59b6;
      font-size:2.2rem;
      margin-bottom:35px;
    }

    /* Shop grid */
    .shop-container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:25px;
      max-width:1100px;
      margin:auto;
    }

    /* Card */
    .card{
      background:#161616;
      border-radius:14px;
      padding:18px;
      text-align:center;
      position:relative;
      transition:.25s;
      box-shadow:0 4px 14px rgba(155,89,182,.25);
      overflow:hidden;
    }

    .card:hover{
      transform:translateY(-6px);
      box-shadow:0 10px 25px rgba(155,89,182,.5);
    }

    .image-box{
      overflow:hidden;
      border-radius:10px;
    }

    .image-box img{
      width:100%;
      height:auto;
      object-fit:contain;
      transition:transform .35s ease;
    }

    .card:hover img{
      transform:scale(1.08);
    }

    .card h3{
      margin:12px 0 6px;
      font-size:1.1rem;
    }

    .card p{
      margin:4px 0 12px;
      color:#bbb;
    }

    .card button{
      background:#9b59b6;
      border:none;
      padding:9px 14px;
      color:white;
      border-radius:6px;
      cursor:pointer;
      font-weight:600;
      transition:.2s;
    }

    .card button:hover{
      background:#8e44ad;
      transform:translateY(-2px);
    }

    .sold-out{
      position:absolute;
      top:12px;
      left:-40px;
      background:#9b59b6;
      color:white;
      padding:6px 45px;
      transform:rotate(-35deg);
      font-size:12px;
      font-weight:bold;
      letter-spacing:1px;
    }

    footer{
      text-align:center;
      color:#9b59b6;
      padding:15px;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div id="sidebar" class="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="closeSidebar()">×</a>
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
    <a href="shop.html">Shop</a>
    <a href="team.html">Meet the People</a>
  </div>

  <!-- Sidebar Button -->
  <span class="openbtn" onclick="openSidebar()">☰ Menu</span>

  <!-- Banner -->
  <div id="banner">
    STILL MAKING THE WEBSITE LOL — will be DONE WHENEVER I FEEL LIKE IT!
  </div>

  <!-- Shop Content -->
 <div class="container">

  <h1>SoftCloud Merch Shop</h1>

  <div class="shop-container">

    <div class="card">
      <div class="sold-out">SOLD OUT</div>
      <div class="image-box">
        <img src="images/SORRYSOLDOUT.jpg" alt="H4RAN Plushie">
      </div>
      <h3>H4RAN Plushie</h3>
      <p>$15.00</p>
      <button onclick="window.location.href='buy.html'">Add to Cart</button>
    </div>

    <div class="card">
      <div class="sold-out">SOLD OUT</div>
      <div class="image-box">
        <img src="images/SORRYSOLDOUT.jpg" alt="MRYOLOPLUSHIE">
      </div>
      <h3>MRYOLOPLUSHIE</h3>
      <p>$15.00</p>
      <button onclick="window.location.href='buy.html'">Add to Cart</button>
    </div>

    <div class="card">
      <div class="sold-out">SOLD OUT</div>
      <div class="image-box">
        <img src="images/criticoplushie.png" alt="CRITICO Plushie">
      </div>
      <h3>CRITICO Plushie</h3>
      <p>$15.00</p>
      <button onclick="window.location.href='buy.html'">Add to Cart</button>
    </div>

  </div> <!-- end of shop-container -->

</div> <!-- end of container -->
  <footer>SOFTCLOUD™</footer>

  <script>
    // Banner hide
    setTimeout(() => {
      const banner = document.getElementById("banner");
      if (banner) {
        banner.style.opacity = "0";
        banner.style.transform = "translateY(-50px)";
        setTimeout(() => banner.style.display = "none", 500);
      }
    }, 5000);

    // Sidebar JS
    function openSidebar() {
      document.getElementById("sidebar").style.width = "220px";
    }

    function closeSidebar() {
      document.getElementById("sidebar").style.width = "0";
    }
  </script>

</body>
</html>
